<html lang=en>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <title>SHANIA MAKUVIRE - Biotechnology and Bioinformatics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #14110f;
        --surface: #556b2f;
        --surface-2: #211c18;
        --line: #2d2620;
        --text: #f2ede4;
        --text-dim: #9c9388;
        --text-faint: #6b645b;
        --accent: #c77b3d;
        --accent-soft: #c77b3d33;
        --status: #6e9277;
        --status-soft: #6e927733;
        --mono: 'IBM Plex Mono', monospace;
        --display: 'Fraunces', serif;
        --body: 'Inter', sans-serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html { scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        line-height: 1.6;
        font-size: 16px;
      }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      a:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }

      /* -------- prompt bar --------- */
      .promptbar {
        border-bottom: 1px solid var(--line);
        background: var(--surace);
        padding: 10px 24px;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 2px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .promptbar .who { color: var(--accent); }
      .cursor {
        display: inline-block;
        width: 7px;
        height: 14px;
        background: var(--accent);
        margin-left: 4px;
        animation: blink 1.1s steps(2, start) infinite;
      }
      @keyframes blink { to { visibility: hidden; } }

    </style>
  </head>
